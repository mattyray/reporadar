[build]
  command = "npm run build"
  publish = "dist"

# Security + cache headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/api/*"
  to = "https://reporadar-production.up.railway.app/api/:splat"
  status = 200

[[redirects]]
  from = "/_allauth/*"
  to = "https://reporadar-production.up.railway.app/_allauth/:splat"
  status = 200

# OAuth callbacks (allauth uses /accounts/ path for provider callbacks)
[[redirects]]
  from = "/accounts/*"
  to = "https://reporadar-production.up.railway.app/accounts/:splat"
  status = 200

# SPA fallback — all non-API routes go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
